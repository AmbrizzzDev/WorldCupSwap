<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorldCupSwap</title>
    <script>
        if (!localStorage.getItem('loggedInUserId')) {
            window.location.replace('/auth/index.html');
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="/home/style.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../friends/friends.css">
    <script type="module" src="myalbum.js" defer></script>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <span class="logo-completo">
                <span1>World</span1><span2>Cup</span2><span3>Swap</span3>
            </span>
            <span class="logo-siglas">
                <span1>W</span1><span2>C</span2><span3>S</span3>
            </span>
        </div>
        <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
            <div id="notifBtn" class="notif-wrapper">
                <span class="notif-icon">📩</span>
                <span id="notifBadge" class="badge">0</span>
            </div>
            <button id="backBtn">Volver</button>
        </div>
    </nav>
    <main class="container">
        <section class="hero">
            <h1>Mi Album</h1>
            <div class="stats-container">
                <span style="color: #7bad49;">Obtenidas: <span id="ownedCount">0</span></span>
                <span style="color: #db1718;">Faltantes: <span id="missingCount">980</span></span>
                <span style="color: #f39c12;">Duplicadas: <span id="duplicatesCount">0</span></span>
            </div>
        </section>

        <section class="controls">
            <div class="control-group">
                <label for="searchInput">Buscar:</label>
                <input type="text" id="searchInput" placeholder="Ej. MEX 1">
            </div>
            <div class="control-group">
                <label for="quickAddInput">Agregar:</label>
                <input type="text" id="quickAddInput" placeholder="Ej. POR 9">
                <button id="quickAddBtn" class="btn-success">Añadir</button>
            </div>
            <div class="control-group">
                <label for="quickRemoveInput">Quitar:</label>
                <input type="text" id="quickRemoveInput" placeholder="Ej. KOR 5">
                <button id="quickRemoveBtn" class="btn-danger">Quitar</button>
            </div>

            <div class="control-group filters">
                <button id="filterAll" class="filter-btn active">Todos</button>
                <button id="filterOwned" class="filter-btn">Obtenidas</button>
                <button id="filterMissing" class="filter-btn">Faltantes</button>
                <button id="filterExtras" class="filter-btn">Sobrantes</button>
                <button id="downloadBtn" class="filter-btn" style="display: none; background: #003366; color: white;">Descargar</button>
            </div>
        </section>

        <div class="album-container">
            <section class="pagination">
                <button id="prevPageBtn">◄ Anterior</button>
                <h2 id="pageTitle">FWC</h2>
                <button id="nextPageBtn">Siguiente ►</button>
            </section>

            <div class="album-page">
                <div id="stickerGrid" class="sticker-grid"></div>
            </div>
    </main>
    <button id="scrollToTopBtn">↑</button>

    <div id="tradeModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>SOLICITUDES</h2>
                <button id="closeTradeModalBtn">&times;</button>
            </div>
            <div id="requestsList" class="results-list"></div>
        </div>
    </div>

    <div id="tutorialModal" class="tutorial-overlay">
        <div class="tutorial-box">
            <h2 id="tutorialTitle">Paso 1</h2>
            <div class="tutorial-image-container">
                <img id="tutorialImage" src="img1.jpg" alt="Tutorial">
            </div>
            <div class="tutorial-text-content">
                <p id="tutorialText"></p>
            </div>
            <div class="tutorial-controls">
                <button id="prevTutorialBtn" class="btn-nav">◄ Atrás</button>
                <button id="nextTutorialBtn" class="btn-nav">Siguiente ►</button>
                <button id="closeTutorialBtn" class="btn-finish" style="display: none;">¡ENTENDIDO!</button>
            </div>
        </div>
    </div>
</body>

</html>
